    <section id="daftarmember">
        <main class="container py-5">
            <header class="member-header text-center mb-5">
                <h1 class="fw-bold">Daftar Member</h1>
                <div class="divider-custom"></div>
            </header>
            <div class="row justify-content-center">
                <div class="col-md-10 col-lg-8">
                    <div class="form-card-member">
                        <form action="javascript:void(0);" class="needs-validation" id="formMember" novalidate>
                            <div class="row mb-4">
                                <label for="nama" class="col-sm-4 col-form-label">Nama Lengkap</label>
                                <div class="col-sm-8">
                                    <input type="text" class="form-control" id="nama" required>
                                </div>
                            </div>
                            <div class="row mb-4">
                                <label for="email" class="col-sm-4 col-form-label">E-mail</label>
                                <div class="col-sm-8">
                                    <input type="email" class="form-control" id="email" name="email" required>
                                </div>
                            </div>
                            <div class="row mb-4">
                                <label for="telp" class="col-sm-4 col-form-label">Nomor Telepon</label>
                                <div class="col-sm-8">
                                    <input type="tel" class="form-control" id="telp" name="telp" required>
                                </div>
                            </div>
                            <div class="row mb-4">
                                <label for="alamat" class="col-sm-4 col-form-label">Alamat</label>
                                <div class="col-sm-8">
                                    <textarea class="form-control" id="alamat" name="alamat" rows="4" required></textarea>
                                </div>
                            </div>
                            <div class="row mb-4">
                                <label for="tgl_lahir" class="col-sm-4 col-form-label">Tanggal Lahir</label>
                                <div class="col-sm-8">
                                    <input type="date" class="form-control" id="tgl_lahir" required>
                                </div>
                            </div>
                            <div class="row mb-4">
                                <label class="col-sm-4 col-form-label">Jenis Kelamin</label>
                                <div class="col-sm-8">
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="gender" id="laki" value="Laki-laki" required>
                                        <label class="form-check-label" for="laki">Laki-laki</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="gender" id="perempuan" value="Perempuan" required>
                                        <label class="form-check-label" for="perempuan">Perempuan</label>
                                    </div>
                                </div>
                            </div>
                            <div class="row mb-4">
                                <label for="preferensi" class="col-sm-4 col-form-label">Preferensi Komunikasi</label>
                                <div class="col-sm-8">
                                    <select class="form-select" id="preferensi" name="preferensi" required>
                                        <option value="" selected disabled>Pilih media komunikasi</option>
                                        <option value="email">E-mail</option>
                                        <option value="whatsapp">Whatsapp</option>
                                        <option value="telpon">Telepon</option>
                                    </select>
                                </div>
                            </div>
                            <div class="row mb-4 align-items-center">
                                <label class="col-sm-4 col-form-label">Langganan Newsletter</label>
                                <div class="col-sm-8">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="newsletter" name="newsletter">
                                        <label class="form-check-label" for="newsletter">
                                            Saya ingin menerima promo dan informasi terbaru.
                                        </label>
                                    </div>
                                </div>
                            </div>
                            <div class="row mb-4">
                                <label for="password" class="col-sm-4 col-form-label">Kata Sandi</label>
                                <div class="col-sm-8">
                                    <input type="password" class="form-control" id="password" name="password" required>
                                </div>
                            </div>
                            <div class="row mb-4">
                                <label for="confirm-password" class="col-sm-4 col-form-label">Konfirmasi Kata Sandi</label>
                                <div class="col-sm-8">
                                    <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                                </div>
                            </div>
                            <div class="row mb-4">
                                <label class="col-sm-4 col-form-label">Persetujuan</label>
                                <div class="col-sm-8">
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="checkbox" id="syarat" name="syarat" required>
                                        <label class="form-check-label" for="syarat">
                                            Saya setuju dengan syarat dan ketentuan yang berlaku.
                                        </label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="privasi" name="privasi" required>
                                        <label class="form-check-label" for="privasi">
                                            Saya setuju dengan kebijakan privasi.
                                        </label>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-sm-8 offset-sm-4">
                                    <button type="submit" class="btn btn-member-submit">Kirim</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </section>
    <section id="footer">
        <div class="container">
            <footer class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4 border-top">
                <p class="col-md-4 mb-0 text-body-secondary">© 2026 Juwellaa</p>
                <a href="/" class="col-md-4 d-flex align-items-center justify-content-center mb-3 mb-md-0 me-md-auto link-body-emphasis text-decoration-none" aria-label="Bootstrap">
                    <svg class="bi me-2" width="40" height="32" aria-hidden="true">
                        <use xlink:href="#bootstrap"></use>
                    </svg>
                </a>
                <ul class="nav col-md-4 justify-content-end">
                    <li class="nav-item"><a href="index.html#beranda" class="nav-link px-2 text-body-secondary">Beranda</a></li>
                    <li class="nav-item"><a href="index.html#tentangkami" class="nav-link px-2 text-body-secondary">Tentang Kami</a></li>

                </ul>
            </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init();
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('formMember');
            form.addEventListener('submit', function (event) {
                event.preventDefault()
                event.stopPropagation()
                if (!form.checkValidity()) {
                    form.classList.add('was-validated');
                } else {
                    alert('Pendaftaran Berhasil! Formulir akan segera dikosongkan.')
                    form.reset()
                    form.classList.remove('was-validated')
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            }, false);
        });
    </script>
